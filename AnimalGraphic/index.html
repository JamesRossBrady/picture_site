<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Graphic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; overflow: hidden; height: 100vh; display: flex; flex-direction: column; font-family: sans-serif; }

    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #111;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      z-index: 10;
    }

    #controls .sliders {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .animal-ctrl {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px;
      background: #1a1a1a;
      border-radius: 8px;
    }

    .animal-ctrl.lethality { border: 1px solid #e74c3c; }
    .animal-ctrl.sociability { border: 1px solid #2ecc71; }
    .animal-ctrl.cuteness { border: 1px solid #3498db; }

    .animal-ctrl.lethality label { color: #e74c3c; }
    .animal-ctrl.sociability label { color: #2ecc71; }
    .animal-ctrl.cuteness label { color: #3498db; }

    .animal-ctrl.lethality input[type=range] { accent-color: #e74c3c; }
    .animal-ctrl.sociability input[type=range] { accent-color: #2ecc71; }
    .animal-ctrl.cuteness input[type=range] { accent-color: #3498db; }

    .animal-ctrl.lethality .weight-val { color: #e74c3c; }
    .animal-ctrl.sociability .weight-val { color: #2ecc71; }
    .animal-ctrl.cuteness .weight-val { color: #3498db; }

    .animal-ctrl .weight-val {
      font-size: 16px;
      font-weight: bold;
      font-family: monospace;
      width: 20px;
      text-align: center;
    }

    #view {
      flex: 1;
      position: relative;
    }

    canvas { display: block; }
  </style>
</head>
<body>
  <div id="controls">
    <span style="color:#888;font-size:12px;">select your personal animal characteristic weight preference:</span>
    <div class="sliders">
      <div class="animal-ctrl lethality">
        <label>Lethality</label>
        <input type="range" id="w-lethality" min="1" max="5" value="1" step="1">
        <span class="weight-val" id="v-lethality">1</span>
      </div>
      <div class="animal-ctrl sociability">
        <label>Sociability</label>
        <input type="range" id="w-sociability" min="1" max="5" value="1" step="1">
        <span class="weight-val" id="v-sociability">1</span>
      </div>
      <div class="animal-ctrl cuteness">
        <label>Cuteness</label>
        <input type="range" id="w-cuteness" min="1" max="5" value="1" step="1">
        <span class="weight-val" id="v-cuteness">1</span>
      </div>
    </div>
  </div>
  <div id="view"></div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const viewDiv = document.getElementById('view');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d0d0d);

    const camera = new THREE.PerspectiveCamera(45, viewDiv.clientWidth / viewDiv.clientHeight, 0.1, 300);
    camera.position.set(55, 30, 45);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewDiv.clientWidth, viewDiv.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    viewDiv.appendChild(renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0x606060, 2));
    const dir = new THREE.DirectionalLight(0xffffff, 3);
    dir.position.set(20, 30, 20);
    scene.add(dir);

    // ── AXES (extend to 50 for max weight * rating) ──
    const AXIS_LEN = 50;

    function makeAxis(color, from, to) {
      const mat = new THREE.LineBasicMaterial({ color });
      const pts = [new THREE.Vector3(...from), new THREE.Vector3(...to)];
      return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat);
    }

    scene.add(makeAxis(0xe74c3c, [-AXIS_LEN,0,0], [AXIS_LEN,0,0]));
    scene.add(makeAxis(0x2ecc71, [0,-AXIS_LEN,0], [0,AXIS_LEN,0]));
    scene.add(makeAxis(0x3498db, [0,0,-AXIS_LEN], [0,0,AXIS_LEN]));

    function makeLabel(text, position, color, scale) {
      const canvas = document.createElement('canvas');
      canvas.width = 512; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = color;
      ctx.font = 'bold 44px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 256, 64);
      const tex = new THREE.CanvasTexture(canvas);
      tex.minFilter = THREE.LinearFilter;
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
      sprite.position.set(...position);
      const s = scale || 8;
      sprite.scale.set(s, s * 0.25, 1);
      return sprite;
    }

    // Tick marks at multiples of 10
    for (let i = -AXIS_LEN; i <= AXIS_LEN; i += 10) {
      if (i === 0) continue;
      scene.add(makeLabel(String(i), [i, -1.5, 0], '#e74c3c', 4));
      scene.add(makeLabel(String(i), [-1.5, i, 0], '#2ecc71', 4));
      scene.add(makeLabel(String(i), [0, -1.5, i], '#3498db', 4));
    }

    // Origin
    const origin = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 12, 12),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    scene.add(origin);

    // Axis names
    scene.add(makeLabel('LETHALITY', [AXIS_LEN + 5, 0, 0], '#e74c3c', 8));
    scene.add(makeLabel('SOCIABILITY', [0, AXIS_LEN + 5, 0], '#2ecc71', 8));
    scene.add(makeLabel('CUTENESS', [0, 0, AXIS_LEN + 5], '#3498db', 8));

    // ── ANIMAL SPRITES ──
    function drawAnimalOutline(name) {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 512;
      const ctx = c.getContext('2d');
      const cx = 256, cy = 256;
      ctx.strokeStyle = '#ffffff';
      ctx.fillStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      const eye = (ex, ey, r) => { ctx.beginPath(); ctx.arc(ex, ey, r || 4, 0, Math.PI * 2); ctx.fill(); };
      const leg4 = (a, b, c2, d) => { [a, b, c2, d].forEach(([lx, ly]) => { ctx.strokeRect(lx - 8, ly, 15, 55); }); };
      const ell = (ex, ey, rx, ry, rot) => { ctx.beginPath(); ctx.ellipse(ex, ey, rx, ry, rot || 0, 0, Math.PI * 2); ctx.stroke(); };

      if (name === 'Zebra') {
        ell(cx, cy + 20, 100, 55); ctx.beginPath(); ctx.moveTo(cx + 70, cy); ctx.quadraticCurveTo(cx + 140, cy - 40, cx + 130, cy - 110); ctx.quadraticCurveTo(cx + 100, cy - 40, cx + 60, cy - 10); ctx.stroke();
        ell(cx + 120, cy - 120, 28, 38, 0.2); ctx.beginPath(); ctx.moveTo(cx + 105, cy - 150); ctx.lineTo(cx + 95, cy - 178); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 130, cy - 152); ctx.lineTo(cx + 140, cy - 180); ctx.stroke();
        leg4([cx - 50, cy + 60], [cx + 20, cy + 60], [cx - 55, cy + 55], [cx + 30, cy + 55]);
        ctx.lineWidth = 2; for (let sx = cx - 60; sx < cx + 60; sx += 22) { ctx.beginPath(); ctx.moveTo(sx, cy - 20); ctx.quadraticCurveTo(sx, cy + 10, sx, cy + 52); ctx.stroke(); }
        ctx.lineWidth = 3; eye(cx + 130, cy - 125, 4);
        ctx.beginPath(); ctx.moveTo(cx - 90, cy + 10); ctx.quadraticCurveTo(cx - 135, cy - 20, cx - 125, cy + 50); ctx.stroke();
      } else if (name === 'Lion') {
        ctx.lineWidth = 2; for (let a = 0; a < Math.PI * 2; a += 0.2) { ctx.beginPath(); ctx.moveTo(cx - 10 + Math.cos(a) * 65, cy - 20 + Math.sin(a) * 65); ctx.lineTo(cx - 10 + Math.cos(a) * 95, cy - 20 + Math.sin(a) * 95); ctx.stroke(); }
        ctx.lineWidth = 3; ell(cx - 10, cy + 50, 70, 50);
        leg4([cx - 40, cy + 85], [cx + 20, cy + 85], [cx - 50, cy + 80], [cx + 30, cy + 80]);
        ctx.beginPath(); ctx.arc(cx - 10, cy - 40, 35, 0, Math.PI * 2); ctx.stroke();
        eye(cx + 18, cy - 28, 5); eye(cx - 20, cy - 45, 4); eye(cx + 5, cy - 42, 4);
        ctx.beginPath(); ctx.moveTo(cx - 70, cy + 20); ctx.quadraticCurveTo(cx - 105, cy - 10, cx - 100, cy + 40); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx - 100, cy + 40, 8, 0, Math.PI * 2); ctx.fill();
      } else if (name === 'Dog') {
        ell(cx - 10, cy + 20, 75, 45); ctx.beginPath(); ctx.arc(cx + 70, cy - 30, 38, 0, Math.PI * 2); ctx.stroke();
        ell(cx + 110, cy - 20, 16, 14, 0.2); eye(cx + 125, cy - 22, 5); eye(cx + 58, cy - 38, 4); eye(cx + 82, cy - 42, 4);
        ell(cx + 42, cy - 78, 12, 24, -0.3); ell(cx + 82, cy - 80, 12, 24, 0.3);
        leg4([cx - 35, cy + 50], [cx + 15, cy + 50], [cx - 45, cy + 48], [cx + 25, cy + 48]);
        ctx.beginPath(); ctx.moveTo(cx - 75, cy + 5); ctx.quadraticCurveTo(cx - 105, cy - 45, cx - 90, cy - 60); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx + 115, cy - 8, 12, 0.1, Math.PI * 0.7); ctx.stroke();
      } else if (name === 'Cat') {
        ell(cx, cy + 20, 55, 40); ctx.beginPath(); ctx.arc(cx + 50, cy - 30, 32, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 35, cy - 60); ctx.lineTo(cx + 25, cy - 85); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 55, cy - 62); ctx.lineTo(cx + 65, cy - 88); ctx.stroke();
        leg4([cx - 30, cy + 50], [cx + 10, cy + 50], [cx - 25, cy + 48], [cx + 20, cy + 48]);
        eye(cx + 55, cy - 36, 4); ctx.beginPath(); ctx.moveTo(cx - 10, cy + 30); ctx.quadraticCurveTo(cx - 40, cy - 10, cx - 30, cy - 20); ctx.stroke();
      } else if (name === 'Elephant') {
        ell(cx, cy + 30, 100, 65); ctx.beginPath(); ctx.arc(cx + 80, cy - 50, 45, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 120, cy - 60); ctx.quadraticCurveTo(cx + 140, cy - 20, cx + 125, cy + 40); ctx.quadraticCurveTo(cx + 115, cy + 20, cx + 100, cy - 40); ctx.stroke();
        ell(cx - 60, cy - 65, 30, 38, -0.3);
        leg4([cx - 50, cy + 80], [cx + 15, cy + 80], [cx - 55, cy + 75], [cx + 40, cy + 75]);
        eye(cx + 95, cy - 55, 4); ctx.beginPath(); ctx.moveTo(cx - 40, cy + 15); ctx.quadraticCurveTo(cx - 70, cy, cx - 60, cy + 30); ctx.stroke();
      } else if (name === 'Shark') {
        ctx.beginPath(); ctx.moveTo(cx + 110, cy); ctx.quadraticCurveTo(cx + 40, cy - 70, cx - 90, cy - 10); ctx.quadraticCurveTo(cx - 30, cy + 40, cx + 110, cy);
        ctx.moveTo(cx - 90, cy - 10); ctx.lineTo(cx - 120, cy + 20); ctx.lineTo(cx - 90, cy + 15); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 30, cy - 55); ctx.lineTo(cx + 20, cy - 95); ctx.lineTo(cx + 50, cy - 50); ctx.stroke();
        eye(cx + 70, cy - 15, 5);
      } else if (name === 'Dolphin') {
        ctx.beginPath(); ctx.moveTo(cx + 100, cy + 20); ctx.quadraticCurveTo(cx + 60, cy - 50, cx - 30, cy - 60); ctx.quadraticCurveTo(cx - 80, cy - 20, cx - 90, cy + 10);
        ctx.quadraticCurveTo(cx - 40, cy + 30, cx + 50, cy + 20); ctx.quadraticCurveTo(cx + 90, cy + 10, cx + 110, cy - 10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 30, cy - 50); ctx.lineTo(cx + 35, cy - 95); ctx.lineTo(cx + 55, cy - 45); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 110, cy - 20); ctx.quadraticCurveTo(cx + 130, cy - 40, cx + 120, cy - 15); ctx.stroke();
        eye(cx + 70, cy - 20, 4);
      } else if (name === 'Rabbit') {
        ctx.beginPath(); ctx.arc(cx, cy + 30, 55, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx + 40, cy - 30, 30, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 25, cy - 58); ctx.lineTo(cx + 20, cy - 110); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 45, cy - 58); ctx.lineTo(cx + 50, cy - 110); ctx.stroke();
        leg4([cx - 25, cy + 75], [cx + 10, cy + 75], [cx - 20, cy + 72], [cx + 20, cy + 72]);
        eye(cx + 50, cy - 32, 4); ctx.beginPath(); ctx.arc(cx + 55, cy - 40, 6, 0, Math.PI); ctx.stroke();
      } else if (name === 'Eagle') {
        ctx.beginPath(); ctx.arc(cx, cy + 10, 30, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - 10, cy + 35); ctx.lineTo(cx - 15, cy + 75); ctx.lineTo(cx - 5, cy + 35); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 10, cy + 35); ctx.lineTo(cx + 15, cy + 75); ctx.lineTo(cx + 5, cy + 35); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - 15, cy - 10); ctx.quadraticCurveTo(cx - 120, cy - 110, cx - 110, cy - 60); ctx.quadraticCurveTo(cx - 30, cy - 20, cx - 15, cy - 10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 15, cy - 10); ctx.quadraticCurveTo(cx + 120, cy - 110, cx + 110, cy - 60); ctx.quadraticCurveTo(cx + 30, cy - 20, cx + 15, cy - 10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 20, cy - 15); ctx.lineTo(cx + 30, cy - 5); ctx.stroke();
        eye(cx + 15, cy + 5, 3); eye(cx - 15, cy + 5, 3);
      } else if (name === 'Wolf') {
        ell(cx, cy + 20, 80, 45); ctx.beginPath(); ctx.arc(cx + 70, cy - 25, 30, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 60, cy - 55); ctx.lineTo(cx + 55, cy - 80); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 80, cy - 50); ctx.lineTo(cx + 85, cy - 75); ctx.stroke();
        leg4([cx - 40, cy + 50], [cx + 15, cy + 50], [cx - 50, cy + 48], [cx + 25, cy + 48]);
        eye(cx + 80, cy - 30, 4);
        ctx.beginPath(); ctx.moveTo(cx - 70, cy + 15); ctx.quadraticCurveTo(cx - 100, cy - 30, cx - 95, cy + 25); ctx.quadraticCurveTo(cx - 90, cy - 10, cx - 80, cy + 10); ctx.stroke();
      } else if (name === 'Panda') {
        ctx.beginPath(); ctx.arc(cx, cy + 30, 70, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx + 40, cy - 30, 38, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx - 30, cy - 70, 18, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx + 30, cy - 70, 18, 0, Math.PI * 2); ctx.stroke();
        eye(cx + 35, cy - 45, 10); eye(cx + 60, cy - 38, 10);
        ctx.beginPath(); ctx.arc(cx + 55, cy - 25, 6, 0, Math.PI * 2); ctx.fill();
        leg4([cx - 30, cy + 85], [cx + 10, cy + 85], [cx - 25, cy + 82], [cx + 20, cy + 82]);
      } else if (name === 'Snake') {
        ctx.beginPath(); ctx.moveTo(cx + 100, cy + 60); ctx.quadraticCurveTo(cx + 50, cy + 100, cx - 20, cy + 60);
        ctx.quadraticCurveTo(cx - 60, cy, cx - 20, cy - 40); ctx.quadraticCurveTo(cx + 40, cy - 80, cx + 60, cy - 20);
        ctx.quadraticCurveTo(cx + 80, cy + 30, cx + 30, cy + 10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 20, cy + 10); ctx.lineTo(cx + 15, cy - 5); ctx.lineTo(cx + 40, cy - 5); ctx.stroke();
        eye(cx + 35, cy + 5, 3); eye(cx + 25, cy + 5, 3);
      } else if (name === 'Cow') {
        ell(cx, cy + 30, 85, 55); ctx.beginPath(); ctx.arc(cx + 70, cy - 50, 35, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 55, cy - 70); ctx.lineTo(cx + 50, cy - 95); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 80, cy - 68); ctx.lineTo(cx + 90, cy - 90); ctx.stroke();
        leg4([cx - 45, cy + 72], [cx + 15, cy + 72], [cx - 50, cy + 68], [cx + 25, cy + 68]);
        eye(cx + 75, cy - 55, 5); ctx.beginPath(); ctx.arc(cx + 55, cy - 40, 10, 0, Math.PI); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - 40, cy - 30); ctx.lineTo(cx - 25, cy - 55); ctx.stroke();
      } else if (name === 'Octopus') {
        ctx.beginPath(); ctx.arc(cx, cy - 10, 45, 0, Math.PI * 2); ctx.stroke();
        eye(cx - 15, cy - 20, 5); eye(cx + 15, cy - 20, 5);
        for (let t = 0; t < 8; t++) {
          const a = -Math.PI / 2 + (t - 3.5) * 0.35;
          ctx.beginPath(); ctx.moveTo(cx + Math.cos(a) * 40, cy + 30);
          ctx.quadraticCurveTo(cx + Math.cos(a) * 80, cy + 100, cx + Math.cos(a) * 120 + Math.sin(a) * 20, cy + 110 + Math.cos(a) * 15);
          ctx.stroke();
        }
      } else if (name === 'Chimpanzee') {
        ell(cx, cy + 30, 55, 40); ctx.beginPath(); ctx.arc(cx + 30, cy - 30, 35, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx - 60, cy - 80, 18, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx + 60, cy - 80, 18, 0, Math.PI * 2); ctx.stroke();
        leg4([cx - 20, cy + 65], [cx + 15, cy + 65], [cx - 30, cy + 60], [cx + 25, cy + 60]);
        ctx.beginPath(); ctx.moveTo(cx - 30, cy); ctx.lineTo(cx - 50, cy - 50); ctx.lineTo(cx - 60, cy - 80); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 30, cy); ctx.lineTo(cx + 50, cy - 50); ctx.lineTo(cx + 60, cy - 80); ctx.stroke();
        eye(cx + 35, cy - 35, 4); eye(cx + 15, cy - 35, 4);
        ctx.beginPath(); ctx.arc(cx + 50, cy - 15, 12, 0, Math.PI); ctx.stroke();
      } else if (name === 'Penguin') {
        ctx.beginPath(); ctx.moveTo(cx, cy + 100); ctx.quadraticCurveTo(cx - 55, cy + 40, cx - 35, cy - 50);
        ctx.quadraticCurveTo(cx - 20, cy - 100, cx, cy - 110); ctx.quadraticCurveTo(cx + 20, cy - 100, cx + 35, cy - 50);
        ctx.quadraticCurveTo(cx + 55, cy + 40, cx, cy + 100); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - 30, cy + 30); ctx.lineTo(cx - 60, cy + 60); ctx.lineTo(cx - 25, cy + 45); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 30, cy + 30); ctx.lineTo(cx + 60, cy + 60); ctx.lineTo(cx + 25, cy + 45); ctx.stroke();
        eye(cx - 12, cy - 50, 4); eye(cx + 12, cy - 50, 4);
        ctx.beginPath(); ctx.moveTo(cx - 8, cy - 20); ctx.lineTo(cx + 8, cy - 20); ctx.lineTo(cx, cy); ctx.stroke();
      } else if (name === 'Crocodile') {
        ctx.beginPath(); ctx.moveTo(cx + 130, cy + 10); ctx.lineTo(cx + 30, cy + 10); ctx.quadraticCurveTo(cx - 30, cy, cx - 40, cy + 30);
        ctx.quadraticCurveTo(cx - 10, cy + 55, cx + 30, cy + 50); ctx.quadraticCurveTo(cx + 100, cy + 20, cx + 130, cy + 10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 130, cy + 10); ctx.lineTo(cx + 160, cy - 5); ctx.lineTo(cx + 130, cy + 20); ctx.stroke();
        leg4([cx - 10, cy + 65], [cx + 25, cy + 65], [cx - 30, cy + 70], [cx + 40, cy + 70]);
        eye(cx + 90, cy + 5, 5); ctx.lineWidth = 1.5;
        for (let sc = cx - 20; sc < cx + 100; sc += 12) { ctx.beginPath(); ctx.moveTo(sc, cy + 15); ctx.lineTo(sc + 4, cy + 40); ctx.stroke(); }
        ctx.lineWidth = 3;
      } else if (name === 'Horse') {
        ell(cx, cy + 20, 100, 55); ctx.beginPath(); ctx.moveTo(cx + 70, cy); ctx.quadraticCurveTo(cx + 140, cy - 40, cx + 130, cy - 110); ctx.quadraticCurveTo(cx + 100, cy - 40, cx + 60, cy - 10); ctx.stroke();
        ell(cx + 120, cy - 120, 28, 38, 0.2); ctx.beginPath(); ctx.moveTo(cx + 105, cy - 150); ctx.lineTo(cx + 95, cy - 178); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 130, cy - 152); ctx.lineTo(cx + 140, cy - 180); ctx.stroke();
        leg4([cx - 50, cy + 60], [cx + 20, cy + 60], [cx - 55, cy + 55], [cx + 30, cy + 55]);
        eye(cx + 130, cy - 125, 4);
        ctx.beginPath(); ctx.moveTo(cx - 90, cy + 10); ctx.quadraticCurveTo(cx - 130, cy - 30, cx - 115, cy + 30); ctx.stroke();
      } else if (name === 'Spider') {
        ctx.beginPath(); ctx.arc(cx, cy, 22, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy - 18, 16, 0, Math.PI * 2); ctx.stroke();
        eye(cx - 6, cy - 22, 3); eye(cx + 6, cy - 22, 3);
        for (let l = 0; l < 8; l++) {
          const a = (l / 8) * Math.PI * 2;
          ctx.beginPath(); ctx.moveTo(cx + Math.cos(a) * 20, cy + Math.sin(a) * 20);
          ctx.quadraticCurveTo(cx + Math.cos(a) * 60, cy + Math.sin(a) * 80, cx + Math.cos(a) * 100, cy + Math.sin(a) * 90);
          ctx.lineWidth = 2; ctx.stroke(); ctx.lineWidth = 3;
        }
      } else if (name === 'Koala') {
        ctx.beginPath(); ctx.arc(cx, cy + 20, 55, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx + 30, cy - 40, 35, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx - 40, cy - 70, 20, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx + 15, cy - 75, 20, 0, Math.PI * 2); ctx.stroke();
        eye(cx + 25, cy - 46, 4); eye(cx + 45, cy - 46, 4);
        ctx.beginPath(); ctx.arc(cx + 45, cy - 35, 12, 0, Math.PI * 2); ctx.stroke();
        leg4([cx - 20, cy + 68], [cx + 15, cy + 68], [cx - 30, cy + 65], [cx + 25, cy + 65]);
      } else {
        // Generic animal outline for remaining species
        ctx.beginPath(); ctx.ellipse(cx, cy + 10, 60, 40, 0, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx + 40, cy - 25, 28, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 25, cy - 50); ctx.lineTo(cx + 20, cy - 70); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 45, cy - 50); ctx.lineTo(cx + 50, cy - 70); ctx.stroke();

    let wLethality = 1, wSociability = 1, wCuteness = 1;

    animals.forEach(a => {
      a.group = new THREE.Group();
      const tex = drawAnimalOutline(a.name);
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
      sprite.scale.set(1.3, 1.3, 1);
      a.group.add(sprite);
      a.group.add(nameLabelSprite(a.name));
      scene.add(a.group);
    });

    function updatePositions() {
      animals.forEach(a => {
        a.group.position.set(
          wLethality * a.lethality,
          wSociability * a.sociability,
          wCuteness * a.cuteness
        );
      });
    }
    updatePositions();

    // ── CONTROLS ──
    document.getElementById('w-lethality').addEventListener('input', function() {
      wLethality = parseInt(this.value);
      document.getElementById('v-lethality').textContent = this.value;
      updatePositions();
    });
    document.getElementById('w-sociability').addEventListener('input', function() {
      wSociability = parseInt(this.value);
      document.getElementById('v-sociability').textContent = this.value;
      updatePositions();
    });
    document.getElementById('w-cuteness').addEventListener('input', function() {
      wCuteness = parseInt(this.value);
      document.getElementById('v-cuteness').textContent = this.value;
      updatePositions();
    });

    // ── CAMERA ORBIT ──
    const target = new THREE.Vector3(0, 0, 0);
    let radius = camera.position.distanceTo(target);
    let theta = Math.atan2(camera.position.x, camera.position.z);
    let phi = Math.asin(camera.position.y / radius);
    let leftDown = false, rightDown = false, middleDown = false;
    let prevX = 0, prevY = 0;

    function updateCamera() {
      camera.position.x = target.x + radius * Math.cos(phi) * Math.sin(theta);
      camera.position.y = target.y + radius * Math.sin(phi);
      camera.position.z = target.z + radius * Math.cos(phi) * Math.cos(theta);
      camera.lookAt(target);
    }

    function isOrbiting() { return middleDown && (leftDown || rightDown); }
    function isPanning() { return middleDown && !leftDown && !rightDown; }

    renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
    renderer.domElement.addEventListener('mousedown', e => {
      if (e.button === 0) leftDown = true;
      if (e.button === 1) { middleDown = true; e.preventDefault(); }
      if (e.button === 2) rightDown = true;
      prevX = e.clientX; prevY = e.clientY;
    });
    window.addEventListener('mousemove', e => {
      if (isOrbiting()) {
        theta -= (e.clientX - prevX) * 0.005;
        phi += (e.clientY - prevY) * 0.005;
        phi = Math.max(-Math.PI/2+0.05, Math.min(Math.PI/2-0.05, phi));
        updateCamera();
      } else if (isPanning()) {
        const right = new THREE.Vector3();
        camera.getWorldDirection(new THREE.Vector3());
        right.crossVectors(camera.getWorldDirection(new THREE.Vector3()), camera.up).normalize();
        const up = camera.up.clone().normalize();
        target.addScaledVector(right, -(e.clientX - prevX) * 0.015);
        target.addScaledVector(up, (e.clientY - prevY) * 0.015);
        updateCamera();
      }
      prevX = e.clientX; prevY = e.clientY;
    });
    window.addEventListener('mouseup', e => {
      if (e.button === 0) leftDown = false;
      if (e.button === 1) middleDown = false;
      if (e.button === 2) rightDown = false;
    });
    renderer.domElement.addEventListener('wheel', e => {
      radius += e.deltaY * 0.03;
      radius = Math.max(8, Math.min(150, radius));
      updateCamera();
    }, { passive: false });

    window.addEventListener('resize', () => {
      camera.aspect = viewDiv.clientWidth / viewDiv.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(viewDiv.clientWidth, viewDiv.clientHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
