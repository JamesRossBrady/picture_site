<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trump Second Term — Corruption & Pardons Timeline</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --bg-card: #1a1a2e;
      --text: #e0e0e0;
      --text-muted: #888;
      --corruption: #e74c3c;
      --pardon: #2ecc71;
      --line: #333;
      --ruler: #555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px 24px 12px;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }

    header h1 {
      font-size: clamp(18px, 2.5vw, 24px);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    header .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    header .subtitle span.corruption-label { color: var(--corruption); }
    header .subtitle span.pardon-label { color: var(--pardon); }

    #timeline-container {
      flex: 1;
      overflow-x: auto;
      overflow-y: auto;
      margin-right: 180px;
      position: relative;
      cursor: grab;
    }

    #timeline-container:active { cursor: grabbing; }
    #timeline-container.dragging { cursor: grabbing; }

    #timeline-content {
      position: relative;
      min-height: 100%;
      min-width: 100%;
    }

    #lines-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .timeline-line {
      position: absolute;
      left: 60px;
      right: 40px;
      height: 2px;
    }

    #corruption-line {
      top: 130px;
      background: var(--corruption);
    }

    #pardons-line {
      top: 340px;
      background: var(--pardon);
    }

    .line-label {
      position: absolute;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      left: 0;
      white-space: nowrap;
    }

    #corruption-line .line-label {
      top: 6px;
      color: var(--corruption);
    }

    #pardons-line .line-label {
      top: -22px;
      color: var(--pardon);
    }

    #ruler {
      position: absolute;
      left: 60px;
      right: 40px;
      height: 36px;
      border-top: 1px solid #444;
      z-index: 1;
      pointer-events: none;
    }

    .ruler-tick {
      position: absolute;
      top: 0;
      width: 1px;
      background: #555;
    }

    .ruler-tick.month {
      height: 14px;
      background: #999;
    }

    .ruler-tick.week {
      height: 6px;
      background: #3a3a3a;
    }

    .ruler-label {
      position: absolute;
      top: 16px;
      font-size: 10px;
      color: #777;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    #markers-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .marker {
      position: absolute;
      pointer-events: auto;
      cursor: pointer;
    }


    .marker-stem {
      position: absolute;
      left: 50%;
      width: 2px;
      transform: translateX(-50%);
      z-index: 1;
    }

    .corruption-marker .marker-stem {
      background: var(--corruption);
    }

    .pardon-marker .marker-stem {
      background: var(--pardon);
    }

    .marker-label {
      position: absolute;
      left: 50%;
      font-size: 10px;
      white-space: nowrap;
      color: #ccc;
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 3px 7px;
      border-radius: 5px;
      background: #1a1a1a;
      border: 1px solid #333;
      pointer-events: auto;
      z-index: 2;
    }

    .corruption-marker .marker-label {
      color: #f5b0aa;
      background: #1f1414;
      border-color: #3a2020;
    }
    .pardon-marker .marker-label {
      color: #a3e8c3;
      background: #141f18;
      border-color: #203a28;
    }

    .marker:hover .marker-label {
      color: #fff;
      background: #252540;
      border-color: #555;
    }

    #cards-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    .card {
      position: absolute;
      width: 340px;
      background: var(--bg-card);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 0;
      color: #ddd;
      box-shadow: 0 6px 28px rgba(0,0,0,0.7);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: auto;
      overflow: hidden;
    }

    .card.expanded {
      opacity: 1;
      transform: translateY(0);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 14px 14px 10px;
      border-bottom: 1px solid #333;
      gap: 8px;
    }

    .card-date {
      font-size: 11px;
      color: #888;
      white-space: nowrap;
    }

    .card-category {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 8px;
    }

    .card-category.corruption { background: rgba(231,76,60,0.2); color: var(--corruption); }
    .card-category.pardon { background: rgba(46,204,113,0.2); color: var(--pardon); }

    .card-close {
      background: none;
      border: none;
      color: #777;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
    }

    .card-close:hover { color: #fff; }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
      padding: 0 14px 10px;
      line-height: 1.3;
    }

    .card-body {
      padding: 0 14px 14px;
      font-size: 13px;
      line-height: 1.6;
      color: #bbb;
      max-height: 180px;
      overflow-y: auto;
    }

    .card-body p { margin-bottom: 8px; }
    .card-body p:last-child { margin-bottom: 0; }

    .card-body .source {
      font-size: 10px;
      color: #666;
      margin-top: 6px;
      font-style: italic;
    }

    .card-body .uscode-links {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #333;
      font-size: 11px;
    }

    .card-body .uscode-links a {
      color: #7eb8da;
      text-decoration: none;
      font-family: monospace;
    }

    .card-body .uscode-links a:hover { text-decoration: underline; }

    #legend {
      position: fixed;
      right: 0;
      top: 0;
      width: 180px;
      height: 100vh;
      background: rgba(10, 10, 10, 0.92);
      border-left: 1px solid #333;
      z-index: 100;
      padding: 16px 12px;
      overflow-y: auto;
      font-size: 11px;
      color: #bbb;
    }
    #legend h3 { font-size: 12px; color: #fff; margin: 0 0 8px 0; }
    #legend .legend-category { border-bottom: 1px solid #1a1a1a; }
    #legend .legend-header { display: flex; justify-content: space-between; padding: 3px 0; cursor: pointer; transition: background 0.15s; }
    #legend .legend-header:hover { background: #1a1a1a; }
    #legend .legend-count { color: #888; }
    #legend .legend-total { margin-top: 6px; padding-top: 4px; border-top: 1px solid #444; font-weight: 600; color: #fff; }
    #legend .legend-category.active { background: #222; color: #fff; }
    #legend .legend-sublist { display: none; padding: 0 0 4px 4px; font-size: 10px; color: #999; }
    #legend .legend-category.open .legend-sublist { display: block; }
    #legend .legend-sublist div[data-name] { padding: 3px 0; cursor: pointer; border-bottom: 1px solid #151515; }
    #legend .legend-sublist div[data-name]:hover { color: #fff; }
    #legend .legend-sublist .sublist-name { display: block; color: #ccc; font-weight: 500; }
    #legend .legend-sublist .sublist-desc { display: block; color: #666; font-size: 9px; line-height: 1.3; margin-top: 1px; }

    .marker-label.highlighted {
      font-size: 13px !important;
      font-weight: 600;
      padding: 5px 10px !important;
      background: #2a2a40 !important;
      border-color: #aaa !important;
      color: #fff !important;
      z-index: 5 !important;
    }

    @media (max-width: 600px) {
      #legend { width: 140px; font-size: 10px; padding: 10px 8px; }
      #timeline-container { margin-right: 140px; }
    }

    .scroll-hint {
      position: absolute;
      bottom: 12px;
      right: 24px;
      font-size: 11px;
      color: #555;
      z-index: 20;
      pointer-events: none;
      animation: fadeHint 3s ease-in-out infinite;
    }

    @keyframes fadeHint {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    @media (max-width: 600px) {
      header { padding: 10px 12px 8px; }
      .card { width: 280px; }
      .card-body { max-height: 140px; font-size: 12px; }
      .marker-label { font-size: 10px; max-width: 90px; }
    }
  </style>
</head>

    function categorizePardon(details) {
      const lower = details.toLowerCase();
      if (lower.includes('murder') || lower.includes('manslaughter')) return 'Murder/Manslaughter';
      if (lower.includes('face act') || lower.includes('clinic') || lower.includes('reproductive')) return 'FACE Act / Clinic';
      if (lower.includes('drug') || lower.includes('cocaine') || lower.includes('narcotic') || lower.includes('methamphetamine') || lower.includes('marijuana') || lower.includes('controlled substance')) return 'Drug Offenses';
      if (lower.includes('bribe') || lower.includes('extortion') || lower.includes('honest services')) return 'Bribery/Corruption';
      if (lower.includes('money laundering') || lower.includes('bank secrecy') || lower.includes('aml')) return 'Money Laundering';
      if (lower.includes('securities') || lower.includes('insider trading')) return 'Securities Fraud';
      if (lower.includes('firearm') || lower.includes('gun') || lower.includes('weapon')) return 'Firearms/Weapons';
      if (lower.includes('january 6') || lower.includes('capitol')) return 'Jan 6 / Election';
      if (lower.includes('clean air') || lower.includes('emissions')) return 'Environmental';
      if (lower.includes('obstruction') || lower.includes('tampering')) return 'Obstruction';
      if (lower.includes('perjury')) return 'Perjury';
      if (lower.includes('theft') || lower.includes('robbery') || lower.includes('burglary') || lower.includes('embezzl')) return 'Theft/Robbery';
      if (lower.includes('foreign agent') || lower.includes('fara')) return 'Foreign Agent';
      if (lower.includes('stalking') || lower.includes('threat')) return 'Stalking/Threats';
      if (lower.includes('tax evasion') || lower.includes('irs') || lower.includes('tax return')) return 'Tax Offenses';
      if (lower.includes('identity theft')) return 'Identity Theft';
      if (lower.includes('conspiracy') && !lower.includes('fraud')) return 'Conspiracy';
      if (lower.includes('fraud') || lower.includes('false statement') || lower.includes('false tax')) return 'Fraud';
      return 'Other';
    }

    let highlightedCategory = null;

    function getCrimeDegree(details, summary) {
      const text = (details + ' ' + summary).toLowerCase();
      // Class A Felony — Life / Death (18 USC § 3559(a)(1))
      if (text.includes('murder') || text.includes('manslaughter')) return 'Class A Felony (Life)';
      if (text.includes('continuing criminal enterprise')) return 'Class A Felony (Life)';
      // Class B Felony — 25+ years (18 USC § 3559(a)(2))
      if (text.includes('armed') && text.includes('robbery')) return 'Class B Felony (25 yrs)';
      if (text.includes('bank fraud')) return 'Class B Felony (30 yrs)';
      // Class C Felony — 10-25 years (18 USC § 3559(a)(3))
      if (text.includes('securities fraud') || text.includes('insider trading')) return 'Class C Felony (20 yrs)';
      if (text.includes('wire fraud') || text.includes('mail fraud')) return 'Class C Felony (20 yrs)';
      if (text.includes('money laundering')) return 'Class C Felony (20 yrs)';
      if (text.includes('tampering') && text.includes('witness')) return 'Class C Felony (20 yrs)';
      if (text.includes('bribe') || text.includes('extortion') || text.includes('honest services')) return 'Class C Felony (15 yrs)';
      if (text.includes('firearm') || text.includes('weapon') || text.includes('felon in possession')) return 'Class C Felony (15 yrs)';
      if (text.includes('cocaine') || text.includes('methamphetamine') || text.includes('heroin') || text.includes('narcotic')) return 'Class C Felony (20 yrs)';
      if (text.includes('distribute') && (text.includes('controlled') || text.includes('marijuana') || text.includes('possess'))) return 'Class C Felony (20 yrs)';
      // Class D Felony — 5-10 years (18 USC § 3559(a)(4))
      if (text.includes('health care fraud')) return 'Class D Felony (10 yrs)';
      if (text.includes('marijuana') || (text.includes('controlled substance') && text.includes('possess'))) return 'Class D Felony (10 yrs)';
      if (text.includes('obstruction of justice') || text.includes('tampering with documents') || text.includes('tampering with proceedings')) return 'Class D Felony (10 yrs)';
      if (text.includes('theft of government') || text.includes('theft of property') || text.includes('second degree theft') || text.includes('shoplifting')) return 'Class D Felony (10 yrs)';
      if (text.includes('computer hack')) return 'Class D Felony (10 yrs)';
      if (text.includes('interstate communications') && text.includes('threat')) return 'Class D Felony (5 yrs)';
      // Class E Felony — 1-5 years (18 USC § 3559(a)(5))
      if (text.includes('perjury')) return 'Class E Felony (5 yrs)';
      if (text.includes('stalking')) return 'Class E Felony (5 yrs)';
      if (text.includes('foreign agent') || text.includes('fara')) return 'Class E Felony (5 yrs)';
      if (text.includes('bank secrecy')) return 'Class E Felony (5 yrs)';
      if (text.includes('identity theft')) return 'Class E Felony (2 yrs)';
      if (text.includes('conspiracy against rights')) return 'Misdemeanor (1 yr)';
      if (text.includes('conspiracy') && text.includes('defraud the united states')) return 'Class E Felony (5 yrs)';
      if (text.includes('conspiracy') && text.includes('internal revenue')) return 'Class E Felony (5 yrs)';
      if (text.includes('conspiracy') && !text.includes('rights')) return 'Class E Felony (5 yrs)';
      if (text.includes('false statement') || text.includes('false labor') || text.includes('false and fraudulent tax')) return 'Class E Felony (5 yrs)';
      if (text.includes('aiding') && text.includes('false') && text.includes('tax')) return 'Class E Felony (5 yrs)';
      if (text.includes('tax evasion') || text.includes('internal revenue') || text.includes('defraud the irs') || text.includes('defraud the internal revenue')) return 'Class E Felony (5 yrs)';
      if (text.includes('failure to pay') && (text.includes('tax') || text.includes('employment'))) return 'Class E Felony (5 yrs)';
      if (text.includes('failure to file') && text.includes('return')) return 'Class E Felony (5 yrs)';
      if (text.includes('election') || text.includes('capitol') || text.includes('january')) return 'Class E Felony (5 yrs)';
      if (text.includes('permitting a convicted felon') && text.includes('insurance')) return 'Class E Felony (5 yrs)';
      if (text.includes('false tax')) return 'Class E Felony (5 yrs)';
      // Misdemeanors
      if (text.includes('face act') || text.includes('freedom of access') || text.includes('clinic access') || text.includes('clinic obstruction')) return 'Misdemeanor (1 yr)';
      if (text.includes('clean air')) return 'Misdemeanor (2 yrs)';
      if (text.includes('national park') || text.includes('trail') || text.includes('superintendent')) return 'Infraction (Fine)';
      // Military
      if (text.includes('violation of lawful orders') || text.includes('army')) return 'UCMJ Offense';
      return 'Federal Offense';
    }

    function renderLegend() {
      const pardons = EVENTS.filter(e => e.line === 'pardon');
      const catMap = {}; // cat → { entries: [{name, desc, degree}], count }
      pardons.forEach(e => {
        const cat = categorizePardon(e.details);
        e._category = cat;
        if (!catMap[cat]) catMap[cat] = { entries: [], count: 0 };
        catMap[cat].entries.push({
          name: e.title,
          desc: e.summary,
          degree: getCrimeDegree(e.details, e.summary)
        });
        catMap[cat].count++;
      });

      const sorted = Object.entries(catMap).sort((a, b) => b[1].count - a[1].count);
      const list = document.getElementById('legend-list');
      list.innerHTML = sorted.map(([cat, data]) =>
        '<div class="legend-category" data-cat="' + cat + '">' +
          '<div class="legend-header">' +
            '<span>' + cat + '</span><span class="legend-count">' + data.count + '</span>' +
          '</div>' +
          '<div class="legend-sublist">' +
            data.entries.map(e =>
              '<div data-name="' + e.name.replace(/"/g, '&quot;') + '">' +
                '<span class="sublist-name">' + e.name + ' &mdash; ' + e.degree + '</span>' +
                '<span class="sublist-desc">' + e.desc + '</span>' +
              '</div>'
            ).join('') +
          '</div>' +
        '</div>'
      ).join('');
      document.getElementById('legend-total').textContent = pardons.length;

      // Toggle dropdown on click
      list.querySelectorAll('.legend-header').forEach(header => {
        header.addEventListener('click', function(e) {
          e.stopPropagation();
          const parent = this.parentElement;
          const wasOpen = parent.classList.contains('open');
          list.querySelectorAll('.legend-category.open').forEach(el => el.classList.remove('open'));
          if (!wasOpen) parent.classList.add('open');
        });
      });

      // Clicking a name scrolls to that marker
      list.querySelectorAll('.legend-sublist div[data-name]').forEach(div => {
        div.addEventListener('click', function(e) {
          e.stopPropagation();
          const name = this.getAttribute('data-name');
          const marker = Array.from(document.querySelectorAll('.marker-label')).find(
            l => l.textContent === name
          );
          if (marker) {
            marker.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            marker.click();
          }
        });
      });
    }

    function updateLabelHighlights() {
      document.querySelectorAll('.marker-label').forEach(label => {
        const cat = label.getAttribute('data-cat');
        if (highlightedCategory && cat === highlightedCategory) {
          label.classList.add('highlighted');
        } else {
          label.classList.remove('highlighted');
        }
      });
    }

    function computeLayout() {
      const totalDays = (CONFIG.endDate - CONFIG.startDate) / (1000 * 60 * 60 * 24);
      const minWidth = Math.max(window.innerWidth, 1800);
      pixelsPerDay = Math.max(15, Math.ceil(totalDays / window.innerWidth * 18));
      timelineWidth = Math.max(minWidth, totalDays * pixelsPerDay + CONFIG.leftPadding + CONFIG.rightPadding);
      content.style.width = timelineWidth + 'px';
    }

    // ── RENDER LINES ────────────────────────────────────────────

    function renderLines() {
      // Corruption line
      const cl = document.createElement('div');
      cl.className = 'timeline-line';
      cl.id = 'corruption-line';
      cl.style.top = CONFIG.corruptionLineY + 'px';
      const corruptionCount = EVENTS.filter(e => e.line === 'corruption').length;
      const pardonCount = EVENTS.filter(e => e.line === 'pardon').length;
      cl.innerHTML = '<span class="line-label">CORRUPTION: ' + corruptionCount + '</span>';
      linesLayer.appendChild(cl);

      // Pardons line
      const pl = document.createElement('div');
      pl.className = 'timeline-line';
      pl.id = 'pardons-line';
      pl.style.top = CONFIG.pardonsLineY + 'px';
      pl.innerHTML = '<span class="line-label">PARDONS: ' + pardonCount + '</span>';
      linesLayer.appendChild(pl);
    }

    // ── RENDER RULER ────────────────────────────────────────────

    function renderRuler() {
      const ruler = document.createElement('div');
      ruler.id = 'ruler';
      ruler.style.top = CONFIG.rulerY + 'px';

      const start = new Date(CONFIG.startDate);
      const end = new Date(CONFIG.endDate);

      // Week ticks
      const d = new Date(start);
      while (d <= end) {
        const x = dateToX(d);
        const isMonth = d.getDate() <= 7;
        const tick = document.createElement('div');
        tick.className = 'ruler-tick ' + (isMonth ? 'month' : 'week');
        tick.style.left = x + 'px';
        tick.style.height = isMonth ? '14px' : '6px';
        ruler.appendChild(tick);
        d.setDate(d.getDate() + 7);
      }

      // Month labels
      const months = [];
      let m = new Date(start.getFullYear(), start.getMonth(), 1);
      while (m <= end) {
        months.push(new Date(m));
        m.setMonth(m.getMonth() + 1);
      }

      months.forEach(m => {
        const x = dateToX(m);
        const label = document.createElement('div');
        label.className = 'ruler-label';
        label.style.left = x + 'px';
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                            'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        label.textContent = monthNames[m.getMonth()] + " '" + String(m.getFullYear()).slice(2);
        ruler.appendChild(label);
      });

      linesLayer.appendChild(ruler);
    }

    // ── POSITION COMPUTATION ────────────────────────────────────

    function dateToX(dateStr) {
      const d = new Date(dateStr);
      const days = (d - CONFIG.startDate) / (1000 * 60 * 60 * 24);
      return CONFIG.leftPadding + (days * pixelsPerDay);
    }

    function computePositions() {
      renderedEvents = EVENTS.map(evt => ({
        ...evt,
        x: dateToX(evt.date),
        staggerLane: 0,
        markerHeight: CONFIG.markerBaseHeight
      }));
    }

    // ── STAGGERING ──────────────────────────────────────────────

    function computeStaggering() {
      const LABEL_W = 120;  // estimated label width in px
      const LABEL_H = 16;   // estimated label height in px

      ['corruption', 'pardon'].forEach(line => {
        const lineEvents = renderedEvents
          .filter(e => e.line === line)
          .sort((a, b) => a.x - b.x);

        const placed = []; // { x, lane, rect: {left, right, top, bottom} }
        const lineY = line === 'corruption' ? CONFIG.corruptionLineY : CONFIG.pardonsLineY;

        lineEvents.forEach(evt => {
          for (let lane = 0; lane < 40; lane++) {
            const mh = CONFIG.markerBaseHeight + lane * CONFIG.markerStaggerStep;
            let rect;
            if (line === 'corruption') {
              rect = {
                left: evt.x - LABEL_W/2,
                right: evt.x + LABEL_W/2,
                top: lineY + mh,
                bottom: lineY + mh + LABEL_H
              };
            } else {
              rect = {
                left: evt.x - LABEL_W/2,
                right: evt.x + LABEL_W/2,
                top: lineY - mh - LABEL_H,
                bottom: lineY - mh
              };
            }

            // Check collision with all previously placed labels
            let collides = false;
            for (let j = 0; j < placed.length; j++) {
              const p = placed[j];
              if (!(rect.right <= p.rect.left || rect.left >= p.rect.right ||
                    rect.bottom <= p.rect.top || rect.top >= p.rect.bottom)) {
                collides = true;
                break;
              }
            }

            if (!collides) {
              evt.staggerLane = lane;
              evt.markerHeight = mh;
              placed.push({ x: evt.x, lane, rect });
              break;
            }
          }
        });
      });
    }

    // ── RENDER MARKERS ──────────────────────────────────────────

    function renderMarkers() {
      markersLayer.innerHTML = '';

      renderedEvents.forEach(evt => {
        const marker = document.createElement('div');
        marker.className = 'marker ' + (evt.line === 'corruption' ? 'corruption-marker' : 'pardon-marker');
        marker.setAttribute('data-event-id', evt.id);
        marker.style.left = evt.x + 'px';

        const isCorruption = evt.line === 'corruption';
        const lineY = isCorruption ? CONFIG.corruptionLineY : CONFIG.pardonsLineY;

        // Stems point INWARD: corruption down, pardons up (both into the gap)
        const stem = document.createElement('div');
        stem.className = 'marker-stem';
        if (isCorruption) {
          stem.style.top = '0px';
          stem.style.bottom = 'auto';
          stem.style.height = evt.markerHeight + 'px';
        } else {
          stem.style.bottom = '0px';
          stem.style.top = 'auto';
          stem.style.height = evt.markerHeight + 'px';
        }

        // Label at the tip of the stem
        const label = document.createElement('div');
        label.className = 'marker-label';
        label.textContent = evt.title;
        if (isCorruption) {
          label.style.top = evt.markerHeight + 'px';
        } else {
          label.style.bottom = evt.markerHeight + 'px';
          label.setAttribute('data-cat', evt._category || categorizePardon(evt.details));
        }
        label.style.transform = 'translateX(-50%)';

        // Container positioning — both markers anchored at their line
        marker.style.top = lineY + 'px';

        marker.appendChild(stem);
        marker.appendChild(label);
        markersLayer.appendChild(marker);
      });
    }

    // ── CARD LOGIC ──────────────────────────────────────────────

    function openCard(evt, markerEl) {
      const containerRect = container.getBoundingClientRect();
      const scrollLeft = container.scrollLeft;
      const viewWidth = containerRect.width;
      const cardWidth = detailCard.offsetWidth || 340;

      const LABEL_W = 120;
      const LABEL_H = 16;
      const isCorruption = evt.line === 'corruption';
      const lineY = isCorruption ? CONFIG.corruptionLineY : CONFIG.pardonsLineY;

      // Anchor card at bottom-right corner of the clicked label
      const labelRight = evt.x + LABEL_W / 2;
      const labelBottom = isCorruption
        ? lineY + evt.markerHeight + LABEL_H
        : lineY - evt.markerHeight;

      let cardX = labelRight - scrollLeft + 8;
      let cardY = labelBottom;

      // Clamp to viewport
      if (cardX + cardWidth > scrollLeft + viewWidth - 10) {
        cardX = labelRight - scrollLeft - cardWidth - 8;
      }
      cardX = Math.max(scrollLeft + 10, cardX);

      detailCard.style.left = cardX + 'px';
      detailCard.style.top = cardY + 'px';

      cardDate.textContent = formatDate(evt.date);
      cardCategory.textContent = evt.line.toUpperCase();
      cardCategory.className = 'card-category ' + evt.line;
      cardTitle.textContent = evt.title;
      cardBody.innerHTML = evt.details + getUSCLinks(evt.details);

      detailCard.classList.add('expanded');
      currentOpenId = evt.id;

      // Mark active marker
      document.querySelectorAll('.marker.active').forEach(m => m.classList.remove('active'));
      if (markerEl) markerEl.classList.add('active');
    }

    function closeCard() {
      detailCard.classList.remove('expanded');
      currentOpenId = null;
      document.querySelectorAll('.marker.active').forEach(m => m.classList.remove('active'));
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function getUSCLinks(details) {
      const lower = details.toLowerCase();
      const links = [];
      const seen = new Set();

      const add = (label, url) => {
        if (!seen.has(label)) { seen.add(label); links.push({ label, url }); }
      };

      if (lower.includes('face act') || lower.includes('freedom of access'))
        add('18 USC § 248', 'https://www.law.cornell.edu/uscode/text/18/248');

      if (lower.includes('conspiracy against rights'))
        add('18 USC § 241', 'https://www.law.cornell.edu/uscode/text/18/241');

      if (lower.includes('controlled substance') || lower.includes('distribute') && (lower.includes('cocaine') || lower.includes('meth') || lower.includes('marijuana') || lower.includes('drug')))
        add('21 USC § 841', 'https://www.law.cornell.edu/uscode/text/21/841');

      if (lower.includes('continuing criminal enterprise'))
        add('21 USC § 848', 'https://www.law.cornell.edu/uscode/text/21/848');

      if (lower.includes('drug') || lower.includes('narcotic'))
        add('21 USC § 841', 'https://www.law.cornell.edu/uscode/text/21/841');

      if (lower.includes('conspiracy') && (lower.includes('distribute') || lower.includes('possess')))
        add('21 USC § 846', 'https://www.law.cornell.edu/uscode/text/21/846');

      if (lower.includes('bank secrecy'))
        add('31 USC § 5311', 'https://www.law.cornell.edu/uscode/text/31/5311');

      if (lower.includes('money laundering'))
        add('18 USC § 1956', 'https://www.law.cornell.edu/uscode/text/18/1956');

      if (lower.includes('wire fraud') || lower.includes('honest services wire fraud'))
        add('18 USC § 1343', 'https://www.law.cornell.edu/uscode/text/18/1343');

      if (lower.includes('mail fraud') || lower.includes('honest services mail fraud'))
        add('18 USC § 1341', 'https://www.law.cornell.edu/uscode/text/18/1341');

      if (lower.includes('securities fraud'))
        add('15 USC § 78j', 'https://www.law.cornell.edu/uscode/text/15/78j');

      if (lower.includes('insider trading'))
        add('15 USC § 78j(b)', 'https://www.law.cornell.edu/uscode/text/15/78j');

      if (lower.includes('bribe') || lower.includes('bribery'))
        add('18 USC § 201', 'https://www.law.cornell.edu/uscode/text/18/201');

      if (lower.includes('extortion'))
        add('18 USC § 1951', 'https://www.law.cornell.edu/uscode/text/18/1951');

      if (lower.includes('firearm') || lower.includes('felon in possession'))
        add('18 USC § 922(g)', 'https://www.law.cornell.edu/uscode/text/18/922');

      if (lower.includes('perjury'))
        add('18 USC § 1621', 'https://www.law.cornell.edu/uscode/text/18/1621');

      if (lower.includes('obstruction of justice'))
        add('18 USC § 1503', 'https://www.law.cornell.edu/uscode/text/18/1503');

      if (lower.includes('tampering') && lower.includes('witness'))
        add('18 USC § 1512', 'https://www.law.cornell.edu/uscode/text/18/1512');

      if (lower.includes('tax evasion'))
        add('26 USC § 7201', 'https://www.law.cornell.edu/uscode/text/26/7201');

      if (lower.includes('foreign agent') || lower.includes('fara'))
        add('22 USC § 611', 'https://www.law.cornell.edu/uscode/text/22/611');

      if (lower.includes('clean air'))
        add('42 USC § 7413', 'https://www.law.cornell.edu/uscode/text/42/7413');

      if (lower.includes('false statement') && (lower.includes('tax') || lower.includes('irs')))
        add('26 USC § 7206', 'https://www.law.cornell.edu/uscode/text/26/7206');

      if (lower.includes('false statement') || lower.includes('false tax'))
        add('18 USC § 1001', 'https://www.law.cornell.edu/uscode/text/18/1001');

      if (lower.includes('bank fraud'))
        add('18 USC § 1344', 'https://www.law.cornell.edu/uscode/text/18/1344');

      if (lower.includes('identity theft') || lower.includes('aggravated identity'))
        add('18 USC § 1028A', 'https://www.law.cornell.edu/uscode/text/18/1028A');

      if (lower.includes('theft of government property') || lower.includes('embezzl'))
        add('18 USC § 641', 'https://www.law.cornell.edu/uscode/text/18/641');

      if (lower.includes('stalking'))
        add('18 USC § 2261A', 'https://www.law.cornell.edu/uscode/text/18/2261A');

      if (lower.includes('murder'))
        add('18 USC § 1111', 'https://www.law.cornell.edu/uscode/text/18/1111');

      if (lower.includes('health care fraud'))
        add('18 USC § 1347', 'https://www.law.cornell.edu/uscode/text/18/1347');

      if (lower.includes('conspiracy') && !links.some(l => l.label.includes('846')))
        add('18 USC § 371', 'https://www.law.cornell.edu/uscode/text/18/371');

      if (lower.includes('computer hack'))
        add('18 USC § 1030', 'https://www.law.cornell.edu/uscode/text/18/1030');

      if (links.length === 0) return '';

      return '<div class="uscode-links">' +
        links.map(l => '<a href="' + l.url + '" target="_blank" rel="noopener">' + l.label + '</a>').join(' &middot; ') +
        '</div>';
    }

    // ── EVENT BINDING ───────────────────────────────────────────

    function bindEvents() {
      // Click on markers (event delegation)
      markersLayer.addEventListener('click', (e) => {
        const marker = e.target.closest('.marker');
        if (!marker) return;

        const eventId = marker.getAttribute('data-event-id');
        const evt = renderedEvents.find(ev => ev.id === eventId);
        if (!evt) return;

        if (currentOpenId === eventId) {
          closeCard();
        } else {
          openCard(evt, marker);
        }
        e.stopPropagation();
      });

      // Click on card close button
      cardClose.addEventListener('click', (e) => {
        closeCard();
        e.stopPropagation();
      });

      // Click outside to close
      document.addEventListener('click', (e) => {
        if (currentOpenId && !e.target.closest('.marker') && !e.target.closest('.card')) {
          closeCard();
        }
      });

      // Escape key to close
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && currentOpenId) {
          closeCard();
        }
      });

      // Scroll hint fade
      container.addEventListener('scroll', updateScrollHint);

      // Resize handler
      let resizeTimeout;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          computeLayout();
          computePositions();
          computeStaggering();
          renderRulerOnly();
          renderMarkers();
          if (currentOpenId) closeCard();
          updateScrollHint();
        }, 200);
      });
    }

    function renderRulerOnly() {
      const oldRuler = document.getElementById('ruler');
      if (oldRuler) oldRuler.remove();
      renderRuler();
    }

    function updateScrollHint() {
      const maxScroll = content.offsetWidth - container.clientWidth;
      if (container.scrollLeft > maxScroll - 40) {
        scrollHint.style.opacity = '0';
      } else {
        scrollHint.style.opacity = '';
      }
    }

    // ── START ───────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', init);
  })();
  </script>
