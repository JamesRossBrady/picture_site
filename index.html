<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picture Site</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #carousel {
      position: relative;
      width: 86vw;
      max-width: 1100px;
      height: 70vh;
      display: flex;
      align-items: center;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      text-decoration: none;
    }

    .slide img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
    }

    .slide-label {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #888;
      background: rgba(13, 13, 13, 0.85);
      padding: 6px 16px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border: none;
      background: rgba(255, 255, 255, 0.06);
      color: #888;
      font-size: 28px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    .arrow:hover {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }

    .arrow-left  { left: 0;   border-radius: 50% 0 0 50%; }
    .arrow-right { right: 0;  border-radius: 0 50% 50% 0; }

    .dots {
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dot.active { background: #aaa; }
  </style>
</head>
<body>
  <div id="carousel">
    <button class="arrow arrow-left"  id="prev">&#8592;</button>
    <button class="arrow arrow-right" id="next">&#8594;</button>

    <div class="slide active" id="slide-0">
      <a href="Epstein_Reams/">
        <img src="Epstein_Reams/Epstein_Reams.png" alt="Epstein Reams">
      </a>
      <div class="slide-label">Epstein Reams</div>
    </div>

    <div class="slide" id="slide-1">
      <a href="TrumpCorruptionAndPardons/">
        <img src="TrumpCorruptionAndPardons/TrumpCorruptionAndPardons.png" alt="Trump Corruption and Pardons">
      </a>
      <div class="slide-label">Trump Corruption &amp; Pardons</div>
    </div>
  </div>

  <div class="dots">
    <span class="dot active" data-index="0"></span>
    <span class="dot" data-index="1"></span>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    let current = 0;

    function show(index) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = ((index % slides.length) + slides.length) % slides.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    document.getElementById('prev').addEventListener('click', () => show(current - 1));
    document.getElementById('next').addEventListener('click', () => show(current + 1));

    dots.forEach(dot => {
      dot.addEventListener('click', () => show(parseInt(dot.getAttribute('data-index'))));
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') show(current - 1);
      if (e.key === 'ArrowRight') show(current + 1);
    });
  </script>
</body>
</html>
