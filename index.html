<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picture Site</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    #carousel {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      padding: 60px 80px 50px;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      overflow: hidden;
    }

    .slide-content img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
    }

    .slide-content iframe {
      width: 100%;
      height: 100%;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0d0d0d;
    }

    .slide-title {
      flex-shrink: 0;
      font-size: 15px;
      color: #888;
      padding: 14px 0 0;
      letter-spacing: 0.5px;
      text-align: center;
    }

    .slide-title a {
      color: #aaa;
      text-decoration: none;
      transition: color 0.2s;
    }

    .slide-title a:hover { color: #fff; }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      border: none;
      background: rgba(255, 255, 255, 0.05);
      color: #777;
      font-size: 30px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    .arrow:hover { background: rgba(255, 255, 255, 0.12); color: #fff; }

    .arrow-left  { left: 12px;  border-radius: 50%; }
    .arrow-right { right: 12px; border-radius: 50%; }

    .dots {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dot.active { background: #aaa; }
  </style>
</head>
<body>
  <div id="carousel">
    <button class="arrow arrow-left"  id="prev">&#8592;</button>
    <button class="arrow arrow-right" id="next">&#8594;</button>

    <div class="slide active" id="slide-0">
      <div class="slide-content">
        <img src="Epstein_Reams/Epstein_Reams.png" alt="Epstein Reams">
      </div>
      <div class="slide-title"><a href="Epstein_Reams/">Epstein Reams</a></div>
    </div>

    <div class="slide" id="slide-1">
      <div class="slide-content">
        <iframe src="TrumpCorruptionAndPardons/index.html" title="Trump Corruption and Pardons"></iframe>
      </div>
      <div class="slide-title"><a href="TrumpCorruptionAndPardons/" target="_blank">Trump Corruption &amp; Pardons &#8599;</a></div>
    </div>
  </div>

  <div class="dots">
    <span class="dot active" data-index="0"></span>
    <span class="dot" data-index="1"></span>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    let current = 0;

    function show(index) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = ((index % slides.length) + slides.length) % slides.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    document.getElementById('prev').addEventListener('click', () => show(current - 1));
    document.getElementById('next').addEventListener('click', () => show(current + 1));
    dots.forEach(dot => dot.addEventListener('click', () => show(parseInt(dot.getAttribute('data-index')))));
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') show(current - 1);
      if (e.key === 'ArrowRight') show(current + 1);
    });
  </script>
</body>
</html>
